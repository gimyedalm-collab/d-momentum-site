<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Dark background -->
  <rect width="1200" height="630" fill="#0e0e0e"/>

  <!-- Top-left section number -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="18" letter-spacing="2" fill="#888888">
    <line x1="80" y1="100" x2="120" y2="100" stroke="#d12d2d" stroke-width="2"/>
    <text x="140" y="106" font-weight="500">N° 01 — GLOBAL TALENT MANAGEMENT</text>
  </g>

  <!-- Center: D MOMENTUM wordmark (rendered as text with subtle horizontal strike-through) -->
  <g transform="translate(80, 280)">
    <text font-family="Helvetica, Arial, sans-serif" font-size="120" font-weight="500"
          fill="#ffffff" letter-spacing="4">D MOMENTUM</text>
    <!-- Horizontal strike line through middle (signature mark) -->
    <line x1="220" y1="-32" x2="1080" y2="-32" stroke="#ffffff" stroke-width="3"/>
  </g>

  <!-- Tagline -->
  <g transform="translate(80, 400)">
    <text font-family="Helvetica, Arial, sans-serif" font-size="32" font-weight="400" fill="#d4d4d4" letter-spacing="-0.5">
      Talent is momentum.
    </text>
  </g>

  <!-- Bottom strip -->
  <g transform="translate(80, 530)" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="16" letter-spacing="2" fill="#888888">
    <text>EST. 2024 · SEOUL · GLOBAL</text>
  </g>

  <!-- Bottom right artist credit -->
  <g transform="translate(1120, 530)" text-anchor="end" font-family="ui-monospace, monospace" font-size="14" letter-spacing="2" fill="#888888">
    <text>ARTIST · 001 · DASHA TARAN</text>
  </g>

  <!-- Decorative line -->
  <line x1="80" y1="560" x2="1120" y2="560" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
</svg>
